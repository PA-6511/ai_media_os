name: python-check

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python compile check
        run: |
          python -m py_compile $(find . -name "*.py")

      - name: Run tests
        run: |
          pytest -q

      - name: Print block registry report
        run: |
          python3 tools/print_block_registry.py --root .
          python3 tools/print_block_registry.py --root . --json

      - name: Save block registry JSON
        run: |
          mkdir -p reports
          python3 tools/print_block_registry.py --root . --json > reports/block_registry.json

      - name: Upload block registry artifact
        uses: actions/upload-artifact@v4
        with:
          name: block-registry
          path: reports/block_registry.json